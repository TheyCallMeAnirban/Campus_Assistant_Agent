<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="22" fill="#111118"/>

  <!-- C arc -->
  <path
    d="M 72 20 A 38 38 0 1 0 72 80"
    stroke="url(#arcG)"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Three lines -->
  <line x1="44" y1="38" x2="70" y2="38" stroke="url(#lg1)" stroke-width="7" stroke-linecap="round"/>
  <line x1="44" y1="52" x2="66" y2="52" stroke="url(#lg2)" stroke-width="7" stroke-linecap="round"/>
  <line x1="44" y1="66" x2="60" y2="66" stroke="url(#lg3)" stroke-width="7" stroke-linecap="round"/>

  <defs>
    <linearGradient id="arcG" x1="50" y1="10" x2="50" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8e8ff"/>
      <stop offset="100%" stop-color="#c8c8f0"/>
    </linearGradient>
    <linearGradient id="lg1" x1="44" y1="38" x2="70" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lg2" x1="44" y1="52" x2="66" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="lg3" x1="44" y1="66" x2="60" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
</svg>